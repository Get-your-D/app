version: '3.9'

services:
  # PostgreSQL Database - EU data residency (must be configured for German region)
  postgres:
    image: postgres:16-alpine
    container_name: health-platform-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-health_platform}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: '-c default_transaction_isolation=serializable'
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - health-net
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}' ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # Redis Cache (for session management and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: health-platform-cache
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - health-net
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-dev-password}
    healthcheck:
      test: [ 'CMD', 'redis-cli', '--raw', 'incr', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # NestJS Backend API
  api:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: health-platform-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-health_platform}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:-dev-super-secret-key-change-in-prod}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: 'http://localhost:3000,http://localhost:3001,http://localhost:3002'
      ENCRYPTION_KEY_ID: local-dev-key
      KMS_REGION: eu-central-1
      LOG_LEVEL: debug
      AUDIT_LOG_RETENTION_DAYS: 2555
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - health-net
    volumes:
      - ./packages/server/src:/app/src
    command: npm run start:dev
    security_opt:
      - no-new-privileges:true

  # Next.js Frontend - Main Web App
  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: health-platform-web
    environment:
      NEXT_PUBLIC_API_URL: http://api:3003
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - health-net
    volumes:
      - ./packages/web/src:/app/src
    security_opt:
      - no-new-privileges:true

  # Next.js Frontend - Dashboard
  web-dashboard:
    build:
      context: ./packages/web-dashboard
      dockerfile: Dockerfile
    container_name: health-platform-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://api:3003
    ports:
      - '3001:3000'
    depends_on:
      - api
    networks:
      - health-net
    volumes:
      - ./packages/web-dashboard/src:/app/src
    security_opt:
      - no-new-privileges:true

  # Next.js Frontend - Patient Portal
  web-patient:
    build:
      context: ./packages/web-patient
      dockerfile: Dockerfile
    container_name: health-platform-patient
    environment:
      NEXT_PUBLIC_API_URL: http://api:3003
    ports:
      - '3002:3000'
    depends_on:
      - api
    networks:
      - health-net
    volumes:
      - ./packages/web-patient/src:/app/src
    security_opt:
      - no-new-privileges:true

  # PgAdmin for Database Administration (Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: health-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - health-net
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  health-net:
    driver: bridge
