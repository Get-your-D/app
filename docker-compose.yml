# Postgres only — for local dev. Server and frontends run on host (npm run dev).
# First time: npm run db:setup   Then: npm run dev
services:
  db:
    image: postgres:16-alpine
    container_name: vitd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - vitd-db-data:/var/lib/postgresql/data

volumes:
  vitd-db-data:
